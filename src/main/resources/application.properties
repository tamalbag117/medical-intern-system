# ===============================
# APPLICATION
# ===============================
spring.application.name=medical-intern-system

# ===============================
# SERVER (RENDER CRITICAL)
# ===============================
server.port=${PORT}
server.address=0.0.0.0
server.tomcat.connection-timeout=5s
server.tomcat.accept-count=100
server.tomcat.max-connections=200

# ===============================
# DATABASE (POSTGRESQL)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.initialization-fail-timeout=0

# ===============================
# JPA / HIBERNATE (STABLE + FAST)
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Required for skipping DB metadata delay
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# Delay repository init (KEY FIX)
spring.data.jpa.repositories.bootstrap-mode=deferred

# Lazy init (reduces startup time)
spring.main.lazy-initialization=true

# ===============================
# PERFORMANCE
# ===============================
spring.sql.init.mode=never
spring.jpa.generate-ddl=false
spring.lifecycle.timeout-per-shutdown-phase=5s

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.mims=INFO

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=300000

# ===============================
# CAPTCHA
# ===============================
captcha.enabled=false

# ===============================
# DEVTOOLS
# ===============================
spring.devtools.restart.enabled=false
spring.main.banner-mode=console