# ===============================
# APPLICATION CONFIG
# ===============================

spring.application.name=medical-intern-system
# 👉 Name of the application (used in logs, monitoring tools, etc.)

server.port=8080
# 👉 Port on which your backend runs


# ===============================
# DATABASE CONFIG (PostgreSQL)
# ===============================
# Database (ENV based)

spring.datasource.url=${DB_URL}
# 👉 Database URL (host + port + database name)

spring.datasource.username=${DB_USER}
# 👉 PostgreSQL username

spring.datasource.password=${DB_PASS}
# 👉 PostgreSQL password


# ===============================
# JPA / HIBERNATE CONFIG
# ===============================

spring.jpa.hibernate.ddl-auto=update
# 👉 Automatically creates/updates tables from entities (use 'validate' in production)

spring.jpa.show-sql=true
# 👉 Shows SQL queries in console (use false in production)

spring.jpa.properties.hibernate.format_sql=true
# 👉 Makes SQL logs readable

spring.jpa.open-in-view=false
# 👉 Prevents DB access in view layer (recommended for performance)


# ===============================
# LOGGING CONFIG
# ===============================

logging.file.name=logs/app.log
# 👉 Stores logs in logs/app.log file

logging.level.root=INFO
# 👉 Default log level (INFO = important logs only)

logging.level.com.mims=DEBUG
# 👉 Your project logs in DEBUG mode (more detailed logs)

logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger - %msg%n
# 👉 Format of logs written in file


# ===============================
# JWT CONFIG (SECURITY)
# ===============================

jwt.secret=mysecretkeymysecretkeymysecretkey
# 👉 Secret key used to sign JWT tokens (must be long & secure)

jwt.expiration=300000
# 👉 Access token expiry in milliseconds (5 minutes)


# ===============================
# DEV / DEBUG SETTINGS (OPTIONAL)
# ===============================

spring.devtools.restart.enabled=true
# 👉 Auto restart app on code changes (useful in development)

spring.main.banner-mode=console
# 👉 Shows Spring Boot banner in console


# ===============================
# FUTURE (OPTIONAL PRODUCTION)
# ===============================

# spring.jpa.show-sql=false
# 👉 Disable SQL logs in production

# logging.level.root=WARN
# 👉 Only show warnings/errors in production

# server.error.include-message=never
# 👉 Hide detailed error messages in production (security)

# Server
